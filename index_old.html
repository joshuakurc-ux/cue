//  🔀 ROUTING LOGIC — Maps answers → result IDs. Edit IDs to change outcomes.
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function route(path, answers, age, feed) {
  // Helper: get answer by question ID
  const a = (id) => {
    const q = QUESTIONS[path]?.find(q => q.id === id);
    return answers.find(x => x.question === q?.q)?.answer || "";
  };

  const isNewborn  = ["0-4w","4-8w"].includes(age);
  const isBF       = feed === "breastfed" || feed === "combination";
  // Hunger threshold differs by feed method
  const isHungry   = (lastFed) => isBF
    ? ["2–3 hours ago","More than 3 hours ago"].includes(lastFed)
    : lastFed === "More than 3 hours ago";
  const isHungryNap = (lastFed) => isBF
    ? ["1.5–2.5 hours ago","More than 2.5 hours ago"].includes(lastFed)
    : lastFed === "More than 2.5 hours ago";
  const feed_r = (bf, ff) => isBF ? bf : ff;

  // ── Path 1: Put to sleep ────────────────────────────────────────────────
  if (path === "sleep") {
    if (a("asleep").startsWith("Yes"))
      return isNewborn ? "sleep_newborn_keep_going" : "sleep_settling";

    const state   = a("current_state");
    const quality = a("feed_quality");
    const lastFed = a("last_fed");
    const pickup  = a("pickup_response");

    if (state === "Arching / pushing away")      return "sleep_arching";
    if (pickup === "Gets more upset")             return "sleep_pickup_worse";
    if (state === "Getting more upset")           return "sleep_escalating";

    const shortFeed = ["Short or distracted","Refused / pulled away"].includes(quality);
    if (isHungry(lastFed))   return feed_r("sleep_feed_hungry_bf","sleep_feed_hungry_ff");
    if (shortFeed)           return feed_r("sleep_topup_bf","sleep_topup_ff");

    return isNewborn ? "sleep_newborn_keep_going" : "sleep_keep_going";
  }

  // ── Path 2: Crying after being put down ────────────────────────────────
  if (path === "crying") {
    const cry      = a("cry_type");
    const teething = a("teething");
    const lastFed  = a("last_fed");
    const offered  = a("feed_offer");
    const isOlder  = ["6-9m","9-12m","12m+"].includes(age);
    const isTeething = teething.startsWith("Yes") && !["0-4w","4-8w"].includes(age);

    if (["Soft / on-and-off","Grizzling"].includes(cry))  return "crying_soft_wait";
    if (cry === "Sudden sharp cries") {
      if (isTeething) return isOlder ? "teething_older" : "teething_young";
      return "crying_sharp_wind";
    }

    if (["Loud and escalating","Hysterical"].includes(cry)) {
      if (isTeething)                                      return isOlder ? "teething_older" : "teething_young";
      if (offered === "Falls asleep feeding")              return "crying_overtired_fed_to_sleep";
      if (offered === "Drinks calmly" && isHungry(lastFed))
        return feed_r("crying_escalating_hungry_bf","crying_escalating_hungry_ff");
      if (["Refuses","Drinks briefly then fusses"].includes(offered))
        return "crying_not_hunger";
      return "crying_escalating_go_in";
    }

    return "crying_watch_longer";
  }

  // ── Path 3: Won't settle at all ────────────────────────────────────────
  if (path === "settle") {
    const duration = a("duration");
    const motion   = a("motion");
    const cry      = a("cry_type");
    const teething = a("teething");
    const lastFed  = a("last_fed");
    const isOlder  = ["6-9m","9-12m","12m+"].includes(age);
    const isTeething = teething.startsWith("Yes") && !["0-4w","4-8w"].includes(age);

    if (duration.startsWith("Yes"))               return "settle_reset_tried_too_long";
    if (motion.startsWith("Yes"))                 return "settle_use_motion";
    if (isTeething)                               return isOlder ? "teething_older" : "teething_young";
    if (cry === "Sharp / sudden")                 return "settle_check_wind";
    if (cry === "Escalating" && isHungryNap(lastFed))
      return feed_r("settle_feed_first_bf","settle_feed_first_ff");

    return "settle_keep_going";
  }

  // ── Path 4: Woke early from nap ────────────────────────────────────────
  if (path === "nap") {
    const short    = a("nap_length");
    const sound    = a("sound");
    const teething = a("teething");
    const lastFed  = a("last_fed");
    const isTeething = teething.startsWith("Yes") && !["0-4w","4-8w"].includes(age);

    if (!short.startsWith("Yes"))    return "nap_complete";
    if (sound === "Soft / stirring") return "nap_wait_resettle";
    if (isTeething)                  return "teething_nap";
    if (sound === "Grizzling")       return isHungryNap(lastFed)
      ? feed_r("nap_feed_hungry_bf","nap_feed_hungry_ff")
      : "nap_grizzle_pause";
    // Crying
    if (isHungryNap(lastFed))
      return feed_r("nap_feed_hungry_bf","nap_feed_hungry_ff");
    return "nap_go_in";
  }

  // ── Path 5: When to put baby down ──────────────────────────────────────
  if (path === "timing") {
    const awake   = a("awake_time");
    const state   = a("current_state");
    const lastFed = a("last_fed");

    if (state === "Very fussy / melting down")    return "timing_overtired_act_fast";
    if (isHungry(lastFed))
      return feed_r("timing_feed_first_bf","timing_feed_first_ff");
    if (state === "Calm and happy" && awake === "Less than 1 hour")
      return "timing_not_ready";
    if (state === "Slightly fussy")               return "timing_wind_down";
    if (state === "Restless / losing interest")   return "timing_put_down_now";

    return "timing_wind_down";
  }

  return "sleep_keep_going"; // fallback
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CONFIG — Questions, paths, age buckets, feed methods
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const AGE_BUCKETS = [
  { label: "0–4 weeks",   value: "0-4w",  wake: "45–60 min" },
  { label: "4–8 weeks",   value: "4-8w",  wake: "60–75 min" },
  { label: "2–3 months",  value: "2-3m",  wake: "75–90 min" },
  { label: "3–4 months",  value: "3-4m",  wake: "90–120 min" },
  { label: "4–6 months",  value: "4-6m",  wake: "2–2.5 hrs" },
  { label: "6–9 months",  value: "6-9m",  wake: "2.5–3 hrs" },
  { label: "9–12 months", value: "9-12m", wake: "3–4 hrs" },
  { label: "12+ months",  value: "12m+",  wake: "4–6 hrs" },
];

const FEED_METHODS = [
  { value: "breastfed",   icon: "🤱", label: "Breastfed",    sub: "Including expressed breast milk" },
  { value: "formula",     icon: "🍼", label: "Formula fed",  sub: "Including combination with formula as main" },
  { value: "combination", icon: "🔄", label: "Combination",  sub: "Regular mix of breast and formula" },
];

const PATHS = [
  { id: "sleep",  icon: "🌙", label: "Put my baby to sleep" },
  { id: "crying", icon: "😭", label: "Baby is crying after being put down" },
  { id: "settle", icon: "😵", label: "Baby won't settle at all" },
  { id: "nap",    icon: "⏱️", label: "Baby woke too early from a nap" },
  { id: "timing", icon: "⏰", label: "When should I put baby down?" },
];

const QUESTIONS = {
  sleep: [
    { id: "asleep",          q: "Has your baby fallen asleep within 10 minutes?",  opts: ["Yes — they settled", "No — still awake"] },
    { id: "last_fed",        q: "When was your baby last fed?",                    opts: ["Less than 1 hour ago", "1–2 hours ago", "2–3 hours ago", "More than 3 hours ago"] },
    { id: "feed_quality",    q: "How did that feed go?",                           opts: ["Full, calm feed", "Short or distracted", "Refused / pulled away", "Fell asleep feeding"] },
    { id: "current_state",   q: "What is your baby doing right now?",              opts: ["Calm but awake", "Fussy / whinging", "Getting more upset", "Arching / pushing away"] },
    { id: "pickup_response", q: "What happens if you pick them up?",               opts: ["Calms quickly", "Still unsettled", "Gets more upset"] },
  ],
  crying: [
    { id: "wake_timing", q: "Did they wake within 5–20 minutes of going down?", opts: ["Yes — very quick wake", "No — later than that"] },
    { id: "cry_type",    q: "What does the cry sound like?",                     opts: ["Soft / on-and-off", "Grizzling", "Loud and escalating", "Sudden sharp cries", "Hysterical"] },
    { id: "teething",    q: "Are there any signs of teething?",                  opts: ["Yes — drooling, chewing, or swollen gums", "No / not sure"] },
    { id: "last_fed",    q: "When was your baby last fed?",                      opts: ["Less than 1 hour ago", "1–2 hours ago", "2–3 hours ago", "More than 3 hours ago"] },
    { id: "feed_offer",  q: "What happens if you offer a feed?",                 opts: ["Drinks calmly", "Drinks briefly then fusses", "Refuses", "Falls asleep feeding"] },
  ],
  settle: [
    { id: "duration",  q: "Have you been trying the same method for 10+ minutes?", opts: ["Yes — nothing is working", "No — just started"] },
    { id: "motion",    q: "Do they settle with movement — rocking, pram, or car?", opts: ["Yes — movement helps", "No — still unsettled"] },
    { id: "cry_type",  q: "What does the cry sound like?",                         opts: ["Whinging / grizzly", "Escalating", "Sharp / sudden"] },
    { id: "teething",  q: "Are there any signs of teething?",                      opts: ["Yes — drooling, chewing, or swollen gums", "No / not sure"] },
    { id: "last_fed",  q: "When was the last feed?",                               opts: ["Less than 1.5 hours ago", "1.5–2.5 hours ago", "More than 2.5 hours ago"] },
  ],
  nap: [
    { id: "nap_length", q: "Did they sleep less than 40 minutes?",  opts: ["Yes — very short nap", "No — longer than that"] },
    { id: "sound",      q: "What do they sound like right now?",     opts: ["Soft / stirring", "Grizzling", "Crying"] },
    { id: "teething",   q: "Are there any signs of teething?",       opts: ["Yes — drooling, chewing, or swollen gums", "No / not sure"] },
    { id: "last_fed",   q: "When was the last feed?",                opts: ["Less than 1.5 hours ago", "1.5–2.5 hours ago", "More than 2.5 hours ago"] },
  ],
  timing: [
    { id: "awake_time",    q: "How long has your baby been awake?",   opts: ["Less than 1 hour", "1–2 hours", "2–3 hours", "More than 3 hours"] },
    { id: "last_sleep",    q: "How did the last sleep go?",           opts: ["Long and restful", "Short", "Very short", "Multiple short naps today"] },
    { id: "current_state", q: "What is your baby doing right now?",   opts: ["Calm and happy", "Slightly fussy", "Restless / losing interest", "Very fussy / melting down"] },
    { id: "last_fed",      q: "When was your baby last fed?",         opts: ["Less than 1 hour ago", "1–2 hours ago", "2–3 hours ago", "More than 3 hours ago"] },
  ],
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  UI — App, screens, styles
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const ACTION_META = {
  WAIT:  { bg: "#e9f2ea", text: "#2a5430", border: "#a8c9ab", emoji: "🤫" },
  FEED:  { bg: "#fdf0e0", text: "#7a4010", border: "#e8c480", emoji: "🍼" },
  HELP:  { bg: "#e2ecf8", text: "#1a3870", border: "#8ab0dc", emoji: "🫶" },
  RESET: { bg: "#fce9e9", text: "#6e1a1a", border: "#d88a8a", emoji: "↩️" },
};

function App() {
  const [babyAge, setBabyAge]       = useState(() => { try { return localStorage.getItem("cue_age") || null; } catch { return null; } });
  const [feedMethod, setFeedMethod] = useState(() => { try { return localStorage.getItem("cue_feed") || null; } catch { return null; } });
  const setupDone = babyAge && feedMethod;
  const [stage, setStage]   = useState(setupDone ? "home" : (!babyAge ? "age" : "feed"));
  const [path, setPath]     = useState(null);
  const [answers, setAnswers] = useState([]);
  const [qIndex, setQIndex] = useState(0);
  const [result, setResult] = useState(null);
  const [fade, setFade]     = useState(true);

  const go = (fn) => { setFade(false); setTimeout(() => { fn(); setFade(true); }, 200); };

  const selectAge = (v) => { try { localStorage.setItem("cue_age", v); } catch {} go(() => { setBabyAge(v); setStage(feedMethod ? "home" : "feed"); }); };
  const selectFeed = (v) => { try { localStorage.setItem("cue_feed", v); } catch {} go(() => { setFeedMethod(v); setStage("home"); }); };
  const selectPath = (p) => go(() => { setPath(p); setAnswers([]); setQIndex(0); setStage("questions"); });

  const answerQ = (answer) => {
    const qs = QUESTIONS[path];
    const newAnswers = [...answers, { question: qs[qIndex].q, answer }];
    setAnswers(newAnswers);
    if (qIndex + 1 >= qs.length) {
      const resultId = route(path, newAnswers, babyAge, feedMethod);
      go(() => { setResult(RESULTS[resultId]); setStage("result"); });
    } else {
      go(() => setQIndex(qIndex + 1));
    }
  };

  const goHome  = () => go(() => { setStage("home"); setResult(null); setPath(null); setAnswers([]); setQIndex(0); });
  const goBack  = () => {
    if (stage === "questions" && qIndex > 0) go(() => { setQIndex(qIndex - 1); setAnswers(answers.slice(0,-1)); });
    else if (stage === "questions")          go(() => setStage("home"));
    else if (stage === "feed")               go(() => setStage("age"));
    else                                     goHome();
  };

  const bucket     = AGE_BUCKETS.find(a => a.value === babyAge);
  const feedBucket = FEED_METHODS.find(f => f.value === feedMethod);
  const fs = { opacity: fade?1:0, transform: fade?"translateY(0)":"translateY(8px)", transition:"opacity 0.2s ease, transform 0.2s ease" };

  return (
    <div style={s.shell}>
      <style>{`@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}} button:active{opacity:0.8;transform:scale(0.98)}`}</style>
      <div style={s.topbar}>
        {(stage==="questions"||stage==="result"||stage==="feed")
          ? <button style={s.navBtn} onClick={goBack}>← Back</button>
          : <div style={{width:70}}/>}
        <div style={s.brandWrap}>
          <span style={s.brandName}>Cue</span>
          <span style={s.brandSub}>Sleep Consultant</span>
        </div>
        {setupDone
          ? <button style={s.settingsPill} onClick={()=>go(()=>setStage("age"))}>{bucket?.label} · {feedBucket?.icon}</button>
          : <div style={{width:80}}/>}
      </div>

      <div style={fs}>
        {stage==="age"       && <AgeScreen  current={babyAge}    onSelect={selectAge}  />}
        {stage==="feed"      && <FeedScreen current={feedMethod} onSelect={selectFeed} />}
        {stage==="home"      && <HomeScreen bucket={bucket} feedBucket={feedBucket} onSelect={selectPath} />}
        {stage==="questions" && <QuestionScreen q={QUESTIONS[path][qIndex]} index={qIndex} total={QUESTIONS[path].length} onAnswer={answerQ} />}
        {stage==="result"    && result && <ResultScreen result={result} onReset={goHome} onRetry={()=>go(()=>{setAnswers([]);setQIndex(0);setStage("questions");})} />}
      </div>
    </div>
  );
}

function AgeScreen({ current, onSelect }) {
  return (
    <div style={s.page}>
      <div style={s.hero}><div style={s.heroEmoji}>👶</div>
        <h1 style={s.h1}>How old is your baby?</h1>
        <p style={s.sub}>We tailor all advice to their age. Set once, remembered always.</p>
      </div>
      <div style={s.list}>
        {AGE_BUCKETS.map(b=>(
          <button key={b.value} style={{...s.rowBtn,...(current===b.value?s.rowActive:{})}} onClick={()=>onSelect(b.value)}>
            <div style={{flex:1}}><div style={s.rowMain}>{b.label}</div><div style={s.rowSub}>Wake window: {b.wake}</div></div>
            <span style={s.arr}>{current===b.value?"✓":"›"}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function FeedScreen({ current, onSelect }) {
  return (
    <div style={s.page}>
      <div style={s.hero}><div style={s.heroEmoji}>🤱</div>
        <h1 style={s.h1}>How do you feed your baby?</h1>
        <p style={s.sub}>This shapes our advice around hunger and feed timing. Set once, remembered always.</p>
      </div>
      <div style={s.list}>
        {FEED_METHODS.map(f=>(
          <button key={f.value} style={{...s.rowBtn,...(current===f.value?s.rowActive:{})}} onClick={()=>onSelect(f.value)}>
            <span style={s.icon}>{f.icon}</span>
            <div style={{flex:1}}><div style={s.rowMain}>{f.label}</div><div style={s.rowSub}>{f.sub}</div></div>
            <span style={s.arr}>{current===f.value?"✓":"›"}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function HomeScreen({ bucket, feedBucket, onSelect }) {
  return (
    <div style={s.page}>
      <div style={s.hero}><div style={s.heroEmoji}>🌙</div>
        <h1 style={s.h1}>What's happening?</h1>
        <p style={s.sub}>Answer a few questions and we'll tell you exactly what to do.</p>
        {bucket && (
          <div style={s.chips}>
            <div style={s.chip}>⏱ {bucket.wake} wake window</div>
            {feedBucket && <div style={s.chip}>{feedBucket.icon} {feedBucket.label}</div>}
          </div>
        )}
      </div>
      <div style={s.list}>
        {PATHS.map(p=>(
          <button key={p.id} style={s.rowBtn} onClick={()=>onSelect(p.id)}>
            <span style={s.icon}>{p.icon}</span>
            <span style={{...s.rowMain,flex:1}}>{p.label}</span>
            <span style={s.arr}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function QuestionScreen({ q, index, total, onAnswer }) {
  return (
    <div style={s.page}>
      <div style={s.qMeta}>
        <div style={s.dots}>{Array.from({length:total}).map((_,i)=><div key={i} style={{...s.dot,background:i<=index?"#6faa73":"#e0d8cc"}}/>)}</div>
        <span style={s.qCount}>{index+1} / {total}</span>
      </div>
      <h2 style={s.qText}>{q.q}</h2>
      <div style={s.list}>
        {q.opts.map((opt,i)=>(
          <button key={i} style={s.rowBtn} onClick={()=>onAnswer(opt)}>
            <span style={{...s.rowMain,flex:1}}>{opt}</span>
            <span style={s.arr}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function ResultScreen({ result, onReset, onRetry }) {
  const meta = ACTION_META[result.action] || ACTION_META.HELP;
  return (
    <div style={s.page}>
      <div style={{...s.card, borderColor:meta.border}}>
        <div style={{...s.badge, background:meta.bg, color:meta.text, borderColor:meta.border}}>
          {meta.emoji} {result.action}
        </div>
        <h2 style={s.resultH}>{result.headline}</h2>
        <p style={s.resultSub}>{result.subtitle}</p>
        <div style={s.rule}/>
        <p style={s.resultBody}>{result.advice}</p>
        {result.tip && <div style={s.tipBox}><p style={s.tipText}>{result.tip}</p></div>}
      </div>
      <button style={s.ghostBtn} onClick={onReset}>← Try another situation</button>
      <button style={{...s.ghostBtn,marginTop:8,color:"#bbb",borderColor:"#ece5db",fontSize:13}} onClick={onRetry}>↺ Redo these questions</button>
    </div>
  );
}

const s = {
  shell:   { minHeight:"100vh", background:"#f6f1e9", fontFamily:"'Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif", maxWidth:480, margin:"0 auto", paddingBottom:40 },
  topbar:  { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"18px 20px 10px" },
  brandWrap: { display:"flex", flexDirection:"column", alignItems:"center", flex:1 },
  brandName: { fontSize:19, letterSpacing:"0.22em", color:"#3a3028", fontStyle:"italic", fontWeight:"normal", lineHeight:1.1 },
  brandSub:  { fontSize:9, letterSpacing:"0.18em", color:"#b0a090", textTransform:"uppercase", lineHeight:1.5 },
  navBtn:    { background:"none", border:"none", color:"#a09080", fontSize:14, cursor:"pointer", padding:0, fontFamily:"inherit", width:70, textAlign:"left" },
  settingsPill: { background:"#edf3ee", border:"1.5px solid #a8c9ab", color:"#2a5430", borderRadius:20, padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"inherit", width:80, textAlign:"center", lineHeight:1.4 },
  page:  { padding:"4px 18px 24px" },
  hero:  { textAlign:"center", padding:"22px 8px 20px" },
  heroEmoji: { fontSize:46, marginBottom:14 },
  h1:    { fontSize:25, color:"#3a3028", fontWeight:"normal", margin:"0 0 10px", lineHeight:1.25 },
  sub:   { fontSize:14.5, color:"#7a6a58", margin:"0 0 14px", lineHeight:1.65, fontStyle:"italic" },
  chips: { display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", marginTop:4 },
  chip:  { display:"inline-flex", alignItems:"center", gap:5, background:"#fff", border:"1.5px solid #e0d8cc", borderRadius:20, padding:"6px 14px", fontSize:12.5, color:"#5a4a38" },
  list:  { display:"flex", flexDirection:"column", gap:9 },
  rowBtn:  { background:"#fff", border:"1.5px solid #e2d9cc", borderRadius:14, padding:"15px 17px", display:"flex", alignItems:"center", gap:12, cursor:"pointer", textAlign:"left", boxShadow:"0 1px 5px rgba(0,0,0,0.04)", transition:"opacity 0.13s, transform 0.13s" },
  rowActive: { background:"#edf3ee", borderColor:"#7aaa7e" },
  rowMain: { fontSize:15, color:"#3a3028", fontFamily:"inherit", lineHeight:1.4 },
  rowSub:  { fontSize:12, color:"#a09080", marginTop:2, fontStyle:"italic" },
  icon:  { fontSize:20, flexShrink:0 },
  arr:   { fontSize:19, color:"#c0b0a0", flexShrink:0 },
  qMeta: { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 0 20px" },
  dots:  { display:"flex", gap:5 },
  dot:   { width:7, height:7, borderRadius:"50%", transition:"background 0.3s" },
  qCount: { fontSize:12, color:"#b0a090", fontStyle:"italic" },
  qText: { fontSize:21, color:"#3a3028", fontWeight:"normal", lineHeight:1.45, margin:"0 0 24px" },
  card:  { background:"#fff", borderRadius:20, padding:"26px 22px", border:"2px solid", marginBottom:14, boxShadow:"0 3px 20px rgba(0,0,0,0.06)" },
  badge: { display:"inline-flex", alignItems:"center", gap:6, fontSize:11, letterSpacing:"0.14em", textTransform:"uppercase", padding:"5px 14px", borderRadius:20, border:"1.5px solid", marginBottom:16, fontFamily:"inherit" },
  resultH:    { fontSize:24, color:"#3a3028", fontWeight:"normal", margin:"0 0 7px", lineHeight:1.2 },
  resultSub:  { fontSize:14, color:"#7a6a58", margin:"0 0 18px", fontStyle:"italic", lineHeight:1.5 },
  rule:       { height:1, background:"#ede6da", margin:"0 0 18px" },
  resultBody: { fontSize:15.5, color:"#4a3e30", lineHeight:1.8, margin:"0 0 16px" },
  tipBox:  { background:"#f5f0e8", borderRadius:11, padding:"12px 15px", borderLeft:"3px solid #6faa73" },
  tipText: { fontSize:13, color:"#6a5a48", fontStyle:"italic", lineHeight:1.6, margin:0 },
  ghostBtn: { background:"transparent", border:"1.5px solid #d0c8bc", borderRadius:12, padding:"14px", fontSize:14, color:"#8a7a68", cursor:"pointer", fontFamily:"inherit", width:"100%" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
